<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Map - Live Visualization</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; }
        #map { height: 100vh; width: 100%; background: #0a0a0a; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px;
            border: 1px solid #333; max-width: 300px;
        }
        .info-panel h3 { color: #00ff00; margin-bottom: 10px; font-size: 14px; }
        .info-panel p { font-size: 12px; margin: 5px 0; }
        .stat { display: inline-block; margin: 5px 10px 5px 0; }
        .stat-value { color: #00ff00; font-weight: bold; }
        .leaflet-popup-content-wrapper { background: rgba(0, 0, 0, 0.9); color: #fff; border: 1px solid #00ff00; }
        .leaflet-popup-tip { background: rgba(0, 0, 0, 0.9); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel">
        <h3>🛡️ Threat Map</h3>
        <div class="stat">Attacks: <span class="stat-value" id="attack-count">0</span></div>
        <div class="stat">Countries: <span class="stat-value" id="country-count">0</span></div>
        <p style="margin-top: 10px; color: #888; font-size: 11px;">Sample data - connect live feed for real attacks</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map with dark theme
        const map = L.map('map').setView([20, 0], 2);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Sample attack data (replace with live feed)
        const attacks = [
            { lat: 55.7558, lng: 37.6173, country: "Russia", type: "SSH_BRUTE_FORCE", ip: "185.220.101.45" },
            { lat: 39.9042, lng: 116.4074, country: "China", type: "HTTP_SCAN", ip: "103.75.201.2" },
            { lat: 52.3676, lng: 4.9041, country: "Netherlands", type: "SSH_LOGIN", ip: "45.155.205.233" },
            { lat: 37.0902, lng: -95.7129, country: "United States", type: "PORT_SCAN", ip: "198.108.67.15" },
            { lat: 48.3794, lng: 31.1656, country: "Ukraine", type: "TELNET_ATTEMPT", ip: "91.240.118.172" }
        ];

        // Add markers
        const countries = new Set();
        attacks.forEach(attack => {
            countries.add(attack.country);
            
            const marker = L.circleMarker([attack.lat, attack.lng], {
                radius: 8,
                fillColor: "#ff4444",
                color: "#ff0000",
                weight: 2,
                opacity: 0.8,
                fillOpacity: 0.6
            }).addTo(map);
            
            marker.bindPopup(`
                <strong style="color: #ff4444;">${attack.type}</strong><br>
                Country: ${attack.country}<br>
                IP: ${attack.ip}<br>
            `);
        });

        // Update stats
        document.getElementById('attack-count').textContent = attacks.length;
        document.getElementById('country-count').textContent = countries.size;

        // Add pulse animation effect
        setInterval(() => {
            const markers = document.querySelectorAll('.leaflet-marker-pane circle');
            markers.forEach((m, i) => {
                m.style.opacity = 0.4 + Math.sin(Date.now() / 500 + i) * 0.3;
            });
        }, 100);
    </script>
</body>
</html>
